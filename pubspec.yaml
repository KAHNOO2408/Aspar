name: accounting_app
description: "A professional accounting app"
publish_to: 'none'
version: 1.0.1+2
environment:
  sdk: ">=3.10.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.2
  flutter_localizations:
    sdk: flutter
  provider: ^6.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path: ^1.8.3
  path_provider: ^2.1.1
  permission_handler: ^11.3.1
  file_picker: ^6.1.1
  flutter_svg: ^2.0.0
  shamsi_date: ^1.1.1
  persian_datetime_picker: ^3.0.0
  fl_chart: ^0.63.0
  local_auth: ^2.1.0
  encrypt: ^5.0.0
  flutter_secure_storage: ^9.0.0
  pointycastle: ^3.7.0
  crypto: ^3.0.2
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.0
  build_runner: ^2.4.0
flutter:
  uses-material-design: true
  assets:
    - assets/logo.svg
    - assets/fonts/
  fonts:
    - family: YekanBakh
      fonts:
        - asset: assets/fonts/YekanBakh-Light.ttf
          weight: 300
        - asset: assets/fonts/YekanBakh-Regular.ttf
          weight: 400
        - asset: assets/fonts/YekanBakh-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/YekanBakh-Bold.ttf
          weight: 700
        - asset: assets/fonts/YekanBakh-ExtraBold.ttf
          weight: 800
        - asset: assets/fonts/YekanBakh-ExtraBlack.ttf
          weight: 900
